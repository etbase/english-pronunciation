<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我的帳戶｜ERIC TING English Pronunciation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
<aside class="sidebar">
  <a class="account-icon" href="login.html" aria-label="我的帳戶"><img src="assets/icons/profile.svg" alt=""></a>
  <script>(function(){try{var u=JSON.parse(localStorage.getItem('pronunciationUser')||'null');if(u&&u.name){var a=document.currentScript.previousElementSibling;a.href='profile.html';a.innerHTML='<span class="account-icon-initial">'+(u.name.trim().charAt(0)||'?').toUpperCase()+'</span>';}}catch(e){}})();</script>
  <nav class="nav">
    <a href="index.html" class=""><img src="assets/icons/home.svg" alt="">發音練習</a>
    <a href="history.html" class=""><img src="assets/icons/history.svg" alt="">歷史紀錄</a>
  </nav>
  <a class="help-link" href="help.html"><img src="assets/icons/help.svg" alt="">使用說明</a>
</aside>
<main>
<header class="header">
  <div class="title">
    <h1>ERIC TING</h1>
    <h2>English Pronunciation</h2>
    <div class="subtitle">MVP Prototype | Listen, Record & Get Instant Feedback</div>
  </div>
</header>
<section class="card page-card">
  <div class="section-title"><span class="num"><img src="assets/icons/profile.svg" alt=""></span>我的帳戶</div>
  <p class="hint">目前是模擬登入資料，正式版會改成真正的 Firebase Authentication 帳號資訊。</p>

  <div class="profile-head">
    <div class="avatar" id="avatarInitial">E</div>
    <div>
      <div class="profile-name-row">
        <strong id="profileName">Ellie</strong>
        <button class="primary-btn btn-outline name-edit-btn" id="editNameBtn">編輯名字</button>
      </div>
      <div class="profile-email" id="profileEmail">ellie@example.com</div>
    </div>
  </div>

  <div class="form" id="editNameForm" style="display:none;margin-top:18px;max-width:360px">
    <input class="input" id="nameInput" maxlength="20" placeholder="輸入新的顯示名字">
    <div style="display:flex;gap:10px">
      <button class="primary-btn btn-compact" id="saveNameBtn">儲存</button>
      <button class="primary-btn btn-outline btn-compact" id="cancelNameBtn">取消</button>
    </div>
  </div>

  <div class="profile-rows">
    <div class="profile-row"><span>已連接帳號</span><span id="profileProvider">Google（模擬）</span></div>
    <div class="profile-row"><span>目前方案</span><span class="plan-badge">免費版</span></div>
    <div class="profile-row"><span>加入時間</span><span id="profileJoined">--</span></div>
  </div>

  <button class="primary-btn btn-danger-outline btn-compact" id="logoutBtn" style="margin-top:20px">登出</button>
</section>

<section class="card page-card" style="margin-top:20px">
  <div class="section-title"><span class="num"><img src="assets/icons/folder.svg" alt=""></span>資料夾</div>
  <div class="folder-create-row">
    <input type="text" id="newFolderInput" class="input" placeholder="新增資料夾名稱" maxlength="20">
    <button type="button" id="newFolderBtn" class="primary-btn btn-compact">新增資料夾</button>
  </div>
  <div class="folder-list" id="folderList"></div>
</section>
<script src="js/folders.js"></script>
<script src="js/audio-player.js"></script>
<script src="js/profile.js"></script>
</main>
<nav class="bottom-nav">
  <a class="bottom-nav-account active" href="login.html" id="bottomAccountLink" aria-label="我的帳戶">
    <span class="bottom-nav-icon" id="bottomAccountIcon"><img src="assets/icons/profile.svg" alt=""></span>
  </a>
  <a href="index.html" class="">
    <span class="bottom-nav-icon"><img src="assets/icons/home.svg" alt=""></span>
    <span>發音練習</span>
  </a>
  <a href="history.html" class="">
    <span class="bottom-nav-icon"><img src="assets/icons/history.svg" alt=""></span>
    <span>歷史紀錄</span>
  </a>
  <a href="help.html" class="">
    <span class="bottom-nav-icon"><img src="assets/icons/help.svg" alt=""></span>
    <span>使用說明</span>
  </a>
</nav>
<script src="js/account-nav.js"></script>
</div>
</body>
</html>
